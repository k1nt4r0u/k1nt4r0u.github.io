{{ with .Site.GetPage "section" "/welcome-header/_index.md" }}
<main>
    <article id="top" class="clearfix">
        <section>
            <div class="img-right">
                <img src="{{ .Params.image }}">
            </div>
            <div>
                <h1>{{ .Params.title }}</h1>
                {{ range .Params.intro }}
                <p>{{ . }}</p>
                {{ end }}
            </div>
        </section>
        <section>
            <h4>{{ .Params.list.name }}</h4>
            <ul>
                {{ range .Params.list.items }}
                <li>{{ . }}</li>
                {{ end }}
            </ul>
        </section>
    </article>
</main>
{{ end }}
