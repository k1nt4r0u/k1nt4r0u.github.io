{{ $giscusDarkTheme := "css/giscus-dark-blue.css" | absURL }}
<div class="comments-section">
  <h2 class="text-2xl font-bold text-neutral-900 dark:text-neutral">Comments</h2>
  <div class="mt-6">
    <script
      src="https://giscus.app/client.js"
      data-repo="{{ .Site.Params.giscus.repo }}"
      data-repo-id="{{ .Site.Params.giscus.repoId }}"
      data-category="{{ .Site.Params.giscus.category }}"
      data-category-id="{{ .Site.Params.giscus.categoryId }}"
      data-mapping="pathname"
      data-strict="0"
      data-reactions-enabled="1"
      data-emit-metadata="0"
      data-input-position="top"
      data-theme="{{ if eq .Site.Params.defaultAppearance "dark" }}{{ $giscusDarkTheme }}{{ else }}light{{ end }}"
      data-lang="{{ .Site.Language.Lang | default "en" }}"
      data-loading="lazy"
      crossorigin="anonymous"
      async></script>
  </div>
</div>

<script>
  (() => {
    const darkTheme = {{ $giscusDarkTheme | jsonify }};
    const giscusTheme = () =>
      document.documentElement.classList.contains("dark") ? darkTheme : "light";

    const syncGiscusTheme = () => {
      const frame = document.querySelector("iframe.giscus-frame");
      if (!frame) {
        return;
      }

      frame.contentWindow.postMessage(
        { giscus: { setConfig: { theme: giscusTheme() } } },
        "https://giscus.app"
      );
    };

    const observer = new MutationObserver(syncGiscusTheme);
    observer.observe(document.documentElement, {
      attributes: true,
      attributeFilter: ["class"],
    });

    window.addEventListener("load", syncGiscusTheme);
  })();
</script>
