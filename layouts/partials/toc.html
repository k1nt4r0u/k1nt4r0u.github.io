<details
  open
  id="TOCView"
  class="toc-right mt-0 overflow-y-auto overscroll-contain bf-scrollbar rounded-lg -ms-5 ps-5 pe-2 hidden lg:block">
  <summary
    class="block py-1 text-lg font-semibold cursor-pointer bg-neutral-100 text-neutral-800 -ms-5 ps-5 dark:bg-neutral-700 dark:text-neutral-100 lg:hidden">
    {{ i18n "article.table_of_contents" }}
  </summary>
  <div
    class="min-w-[220px] py-2 border-dotted border-s-1 -ms-5 ps-5 dark:border-neutral-600">
    {{ .TableOfContents | emojify }}
  </div>
</details>
<details class="toc-inside mt-0 overflow-hidden rounded-lg -ms-5 ps-5 lg:hidden">
  <summary
    class="py-1 text-lg font-semibold cursor-pointer bg-neutral-100 text-neutral-800 -ms-5 ps-5 dark:bg-neutral-700 dark:text-neutral-100 lg:hidden">
    {{ i18n "article.table_of_contents" }}
  </summary>
  <div
    class="py-2 border-dotted border-neutral-300 border-s-1 -ms-5 ps-5 dark:border-neutral-600">
    {{ .TableOfContents | emojify }}
  </div>
</details>

{{ if .Site.Params.smartTOC }}
<script>
  (function () {
    'use strict'

    const SCROLL_OFFSET_RATIO = 0.33
    const TOC_SELECTOR = '#TableOfContents'
    const ANCHOR_SELECTOR = '.anchor'
    const TOC_LINK_SELECTOR = 'a[href^="#"]'
    const NESTED_LIST_SELECTOR = 'li ul'
    const ACTIVE_LINK_CLASS = 'toc-active'
    const ACTIVE_ITEM_CLASS = 'toc-active-item'
    let isJumpingToAnchor = false
    let lastActiveId = ''
    let jumpResetTimer = 0
    let ticking = false

    function markAnchorJump() {
      isJumpingToAnchor = true
      window.clearTimeout(jumpResetTimer)
      jumpResetTimer = window.setTimeout(() => {
        isJumpingToAnchor = false
      }, 900)
    }

    function getActiveAnchorId(anchors, anchorTops, tocIds, offsetRatio) {
      const threshold = window.scrollY + window.innerHeight * offsetRatio

      if (isJumpingToAnchor) {
        for (let i = 0; i < anchors.length; i++) {
          const anchor = anchors[i]
          if (!tocIds.has(anchor.id)) continue
          const top = anchorTops[i]
          if (Math.abs(window.scrollY - top) < 100) {
            return anchor.id
          }
        }
      }

      for (let i = anchors.length - 1; i >= 0; i--) {
        const top = anchorTops[i]
        if (top <= threshold && tocIds.has(anchors[i].id)) {
          return anchors[i].id
        }
      }
      return anchors.find(anchor => tocIds.has(anchor.id))?.id || ''
    }

    function keepActiveLinkVisible(link) {
      if (!link) return
      link.scrollIntoView({
        block: 'nearest',
        inline: 'nearest',
        behavior: 'smooth'
      })
    }

    function measureAnchorTops(anchors) {
      return anchors.map(anchor => anchor.getBoundingClientRect().top + window.scrollY)
    }

    function updateTOC({ toc, anchors, anchorTops, tocIds, links, scrollOffset, collapseInactive }) {
      const activeId = getActiveAnchorId(anchors, anchorTops, tocIds, scrollOffset)
      if (!activeId) return

      let activeLink = null

      links.forEach(link => {
        const isActive = link.getAttribute('href') === `#${activeId}`
        const listItem = link.closest('li')

        link.classList.toggle(ACTIVE_LINK_CLASS, isActive)
        listItem?.classList.toggle(ACTIVE_ITEM_CLASS, isActive)

        if (isActive) {
          activeLink = link
        }

        if (collapseInactive) {
          const ul = listItem?.querySelector('ul')
          if (ul) ul.style.display = isActive ? '' : 'none'
        }
      })

      if (collapseInactive) {
        let el = activeLink
        while (el && el !== toc) {
          if (el.tagName === 'UL') el.style.display = ''
          if (el.tagName === 'LI') el.querySelector('ul')?.style.setProperty('display', '')
          el = el.parentElement
        }
      }

      if (activeLink && activeId !== lastActiveId) {
        keepActiveLinkVisible(activeLink)
        lastActiveId = activeId
      }
    }

    function requestTOCUpdate(config) {
      if (ticking) return
      ticking = true
      window.requestAnimationFrame(() => {
        updateTOC(config)
        ticking = false
      })
    }

    function initTOC() {
      const toc = document.querySelector(TOC_SELECTOR)
      if (!toc) return

      const collapseInactive = {{ if site.Params.smartTOCHideUnfocusedChildren }}true{{ else }}false{{ end }}
      const anchors = [...document.querySelectorAll(ANCHOR_SELECTOR)]
      const links = [...toc.querySelectorAll(TOC_LINK_SELECTOR)]
      const tocIds = new Set(links.map(link => link.getAttribute('href').substring(1)))

      if (collapseInactive) {
        toc.querySelectorAll(NESTED_LIST_SELECTOR).forEach(ul => ul.style.display = 'none')
      }

      links.forEach(link => {
        link.addEventListener('click', () => {
          markAnchorJump()
        })
      })

      const config = {
        toc,
        anchors,
        anchorTops: measureAnchorTops(anchors),
        tocIds,
        links,
        scrollOffset: SCROLL_OFFSET_RATIO,
        collapseInactive
      }

      window.addEventListener('scroll', () => requestTOCUpdate(config), { passive: true })
      window.addEventListener('resize', () => {
        config.anchorTops = measureAnchorTops(config.anchors)
        requestTOCUpdate(config)
      }, { passive: true })
      window.addEventListener('load', () => {
        config.anchorTops = measureAnchorTops(config.anchors)
        requestTOCUpdate(config)
      })
      window.addEventListener('hashchange', () => {
        markAnchorJump()
        config.anchorTops = measureAnchorTops(config.anchors)
        requestTOCUpdate(config)
      }, { passive: true })

      updateTOC(config)
    }

    document.readyState === 'loading'
      ? document.addEventListener('DOMContentLoaded', initTOC)
      : initTOC()
  })()
</script>
{{ end }}
