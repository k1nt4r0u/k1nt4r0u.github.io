{{ $scrollProgress := resources.Get "js/scroll-progress.js" | resources.Minify | resources.Fingerprint (.Site.Params.fingerprintAlgorithm | default "sha512") }}
<script>
  (() => {
    if (
      document.body.classList.contains("section-writeups") ||
      document.body.classList.contains("page-home") ||
      window.matchMedia("(max-width: 768px), (prefers-reduced-motion: reduce)").matches
    ) {
      return;
    }

    const script = document.createElement("script");
    script.defer = true;
    script.type = "text/javascript";
    script.src = "{{ $scrollProgress.RelPermalink }}";
    script.integrity = "{{ $scrollProgress.Data.Integrity }}";
    script.crossOrigin = "anonymous";
    document.currentScript.after(script);
  })();
</script>
