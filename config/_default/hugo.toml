theme = "blowfish"
baseURL = "https://k1nt4r0u.github.io/"
defaultContentLanguage = "en"
languageCode = "en"
enableRobotsTXT = true
enableEmoji = true
summaryLength = 18
buildDrafts = false
buildFuture = false

[pagination]
  pagerSize = 12

[imaging]
  anchor = "Center"

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]

[related]
  threshold = 0
  toLower = false

  [[related.indices]]
    name = "tags"
    weight = 100

  [[related.indices]]
    name = "categories"
    weight = 100

  [[related.indices]]
    name = "series"
    weight = 50

  [[related.indices]]
    name = "date"
    weight = 10

  [[related.indices]]
    applyFilter = false
    name = "fragmentrefs"
    type = "fragments"
    weight = 10
